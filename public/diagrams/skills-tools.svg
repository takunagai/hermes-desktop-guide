<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img"
  aria-label="下層のツールセットと上層のスキル、横に並ぶMCPの関係。スキルがツールやMCP由来のツールを組み合わせて使う構造を示した図">
  <title>スキルとツールとMCPの関係</title>
  <desc>上層にスキル（SKILL.md＝手順・段取り）、下層にツールセット（エージェントが直接呼ぶ関数）、横にMCP（外部サーバーが提供するツール）を置き、スキルがツールやMCPを組み合わせて呼び出す関係を示す。</desc>
  <style>
    text { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", sans-serif; font-weight: bold; }
    .box { fill: #ffffff; stroke: #c7d2fe; stroke-width: 1.5; }
    .box-accent { fill: #4f46e5; }
    .label { fill: #312e81; }
    .label-accent { fill: #ffffff; }
    .sub { fill: #475569; font-weight: normal; }
    .sub-accent { fill: #e0e7ff; font-weight: normal; }
    .note { fill: #64748b; font-weight: normal; }
    .link { stroke: #818cf8; stroke-width: 2.5; fill: none; }
    .arrowhead { fill: #818cf8; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1e1b3a; stroke: #4338ca; }
      .box-accent { fill: #6366f1; }
      .label { fill: #e0e7ff; }
      .sub { fill: #cbd5e1; }
      .note { fill: #94a3b8; }
      .link { stroke: #a5b4fc; }
      .arrowhead { fill: #a5b4fc; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrowhead" />
    </marker>
  </defs>

  <!-- 上層: スキル（手順・段取り） -->
  <rect class="box-accent" x="150" y="56" width="380" height="96" rx="12" />
  <text class="label-accent" x="340" y="98" text-anchor="middle" font-size="18">スキル（SKILL.md）</text>
  <text class="sub-accent" x="340" y="126" text-anchor="middle" font-size="12.5">手順・段取り。ツールを組み合わせて使う</text>

  <!-- 下層: ツールセット（直接呼ぶ関数） -->
  <rect class="box" x="60" y="290" width="320" height="100" rx="12" />
  <text class="label" x="220" y="328" text-anchor="middle" font-size="17">ツールセット</text>
  <text class="sub" x="220" y="354" text-anchor="middle" font-size="12">read_file・web_search など</text>
  <text class="sub" x="220" y="374" text-anchor="middle" font-size="12">エージェントが直接呼ぶ関数</text>

  <!-- 横: MCP（外部サーバー提供のツール） -->
  <rect class="box" x="450" y="290" width="210" height="100" rx="12" />
  <text class="label" x="555" y="328" text-anchor="middle" font-size="17">MCP</text>
  <text class="sub" x="555" y="354" text-anchor="middle" font-size="12">外部サーバーが</text>
  <text class="sub" x="555" y="374" text-anchor="middle" font-size="12">公開するツール</text>

  <!-- スキル → ツールセット -->
  <line class="link" x1="300" y1="152" x2="232" y2="288" marker-end="url(#arrow)" />
  <!-- スキル → MCP -->
  <line class="link" x1="400" y1="152" x2="528" y2="288" marker-end="url(#arrow)" />
  <text class="note" x="220" y="232" text-anchor="middle" font-size="11.5">組み合わせて呼ぶ</text>
  <text class="note" x="520" y="232" text-anchor="middle" font-size="11.5">MCP経由でも呼ぶ</text>
</svg>
