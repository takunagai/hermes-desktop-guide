<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <filter id="grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="2.4" intercept="-0.7"/>
      <feFuncG type="linear" slope="2.4" intercept="-0.7"/>
      <feFuncB type="linear" slope="2.4" intercept="-0.7"/>
    </feComponentTransfer>
  </filter>
  <filter id="clouds" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="11" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="300" height="300" filter="url(#clouds)" opacity="0.18"/>
  <rect width="300" height="300" filter="url(#grain)"/>
</svg>
